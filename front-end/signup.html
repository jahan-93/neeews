<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - neeews</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-sky-50 text-slate-800 font-sans min-h-screen">

    <nav class="bg-white shadow-sm border-b border-sky-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/home" class="text-3xl font-black text-blue-600 tracking-tighter">neee<span class="text-sky-400">ws</span></a>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-16">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-sky-100">
            <h1 class="text-2xl font-bold text-slate-900 mb-1">회원가입</h1>
            <p class="text-slate-500 text-sm mb-6">neeews 계정을 만들어보세요</p>

            <form id="signup-form" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">이메일</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        required
                        autocomplete="email"
                        class="w-full px-4 py-2.5 rounded-lg border border-sky-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="you@example.com"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        autocomplete="new-password"
                        class="w-full px-4 py-2.5 rounded-lg border border-sky-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="••••••••"
                    >
                    <p class="text-xs text-slate-400 mt-1">영문+숫자 포함 8자 이상</p>
                </div>

                <div>
                    <label for="password-confirm" class="block text-sm font-medium text-slate-700 mb-1">비밀번호 확인</label>
                    <input
                        id="password-confirm"
                        name="password-confirm"
                        type="password"
                        required
                        autocomplete="new-password"
                        class="w-full px-4 py-2.5 rounded-lg border border-sky-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="••••••••"
                    >
                </div>

                <p id="error-message" class="text-sm text-red-600 hidden"></p>
                <p id="success-message" class="text-sm text-green-600 hidden"></p>

                <button
                    id="submit-btn"
                    type="submit"
                    class="w-full py-2.5 rounded-full bg-blue-600 hover:bg-blue-700 text-white font-medium transition-colors shadow-lg shadow-blue-100 disabled:opacity-60 disabled:cursor-not-allowed"
                >
                    회원가입
                </button>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">
                이미 계정이 있으신가요?
                <a href="/login.html" class="text-blue-600 font-medium hover:underline">로그인</a>
            </p>
        </div>
    </main>

    <script>
        const API_BASE_URL = "";

        const form = document.getElementById("signup-form");
        const errorMessage = document.getElementById("error-message");
        const successMessage = document.getElementById("success-message");
        const submitBtn = document.getElementById("submit-btn");

        function showError(message) {
            successMessage.classList.add("hidden");
            errorMessage.textContent = message;
            errorMessage.classList.remove("hidden");
        }

        function showSuccess(message) {
            errorMessage.classList.add("hidden");
            successMessage.textContent = message;
            successMessage.classList.remove("hidden");
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const passwordConfirm = document.getElementById("password-confirm").value;

            if (password !== passwordConfirm) {
                showError("비밀번호가 일치하지 않습니다.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "가입 중...";

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.detail || "회원가입에 실패했습니다.");
                    return;
                }

                showSuccess(data.message || "가입이 완료되었습니다. 이메일을 확인해주세요.");
                form.reset();
            } catch (err) {
                showError("서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "회원가입";
            }
        });
    </script>

</body>
</html>
